# Run unit tests on every PR and push to main.
# Test results are written to the workflow job summary (visible on the Actions
# page). The README badge auto-reflects pass/fail via the workflow status.

name: CI - Tests

on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "setup/**"
      - "LICENSE"
  push:
    branches:
      - main
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "setup/**"
      - "LICENSE"

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: "1.95.0"
          override: true
          components: rustfmt, clippy

      # Cache compiled deps for faster subsequent runs
      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # ── Lint ────────────────────────────────────────────────────────────────
      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all -- -D warnings

      # ── Unit tests (no Docker / integration tests) ───────────────────────────
      # Integration tests in test_integrations.rs require testcontainers+Docker.
      # They are excluded here and run separately in a nightly / pre-release job.
      - name: Run unit tests
        id: run_tests
        run: |
          cargo test --lib --bins 2>&1 | tee /tmp/test_output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      # ── Parse results & write job summary ────────────────────────────────────
      - name: Write job summary
        if: always()
        run: |
          OUTPUT=$(cat /tmp/test_output.txt)

          PASSED=$(echo "$OUTPUT" | grep -oE '[0-9]+ passed' | awk '{sum+=$1} END{print sum+0}')
          FAILED=$(echo "$OUTPUT" | grep -oE '[0-9]+ failed' | awk '{sum+=$1} END{print sum+0}')
          IGNORED=$(echo "$OUTPUT" | grep -oE '[0-9]+ ignored' | awk '{sum+=$1} END{print sum+0}')

          if [ "$FAILED" -eq 0 ]; then
            STATUS="✅ passing"
          else
            STATUS="❌ failing"
          fi

          {
            echo "## CI Test Results"
            echo ""
            echo "| Metric | Value |"
            echo "|--------|-------|"
            echo "| Status | $STATUS |"
            echo "| Passed | $PASSED |"
            echo "| Failed | $FAILED |"
            echo "| Ignored | $IGNORED |"
            echo "| Branch | \`${{ github.head_ref || github.ref_name }}\` |"
            echo "| Run date | $(date -u +"%Y-%m-%d") |"
          } >> "$GITHUB_STEP_SUMMARY"

          # Propagate failure
          if [ "$FAILED" -ne 0 ]; then
            echo "❌ $FAILED test(s) failed."
            exit 1
          fi
          echo "✅ All $PASSED tests passed."
