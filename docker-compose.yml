# docker-compose.yml - Velox tunnel server + Caddy reverse proxy with auto-TLS
#
# Transport modes:
#   WebSocket/HTTP2  - via Caddy (HTTPS/WSS, auto-TLS on port 443)
#   QUIC             - direct UDP on port 8443 (TLS handled by velox itself;
#                      Caddy cannot proxy UDP/QUIC)
#
# Quick start:
#   cp .env.example .env          # set VELOX_DOMAIN, CLOUDFLARE_API_TOKEN, CADDY_EMAIL
#   docker compose up -d
#
# After setup, expose any local port with a single command — no server config needed:
#   velox client -R 'tcp://3001:localhost:3000' quic://${VELOX_DOMAIN}:${QUIC_PORT:-8443}
#   → https://3001.${VELOX_DOMAIN}  (wildcard TLS cert, auto-issued via Cloudflare DNS-01)
#
# WebSocket client (works through corporate proxies):
#   velox client -L socks5://127.0.0.1:1080 wss://${VELOX_DOMAIN}
# QUIC client (binary must be built with --features quic):
#   velox client -L socks5://127.0.0.1:1080 quic://${VELOX_DOMAIN}:${QUIC_PORT:-8443}

services:
  # ─── Velox tunnel server ────────────────────────────────────────────────────
  velox:
    image: ghcr.io/aerol-ai/velox:latest
    restart: unless-stopped
    # Run as root so velox can read Caddy's cert files (Caddy writes them as
    # root:root mode 0600 inside the shared `caddy_data` volume).
    user: root
    dns:
      - 1.1.1.1
      - 8.8.8.8
    environment:
      # Run plain WebSocket - Caddy terminates TLS externally.
      SERVER_PROTOCOL: ws
      SERVER_LISTEN: "[::]"
      SERVER_PORT: "8080"
      RUST_LOG: "${RUST_LOG:-INFO}"
      # QUIC: velox handles TLS directly on a separate UDP port.
      # Set QUIC_BIND to enable; leave blank to disable.
      QUIC_BIND: "${QUIC_BIND:-[::]:${QUIC_PORT:-8443}}"
      VELOX_EXTRA_ARGS: "${VELOX_EXTRA_ARGS:-}"
    ports:
      # QUIC is UDP-only - expose directly (Caddy cannot proxy UDP).
      # Caddy handles port 443 (WebSocket/HTTP2 over TLS).
      - "${QUIC_PORT:-8443}:${QUIC_PORT:-8443}/udp"
    volumes:
      # Uncomment to apply a custom restrictions config.
      # The file controls which tunnels are permitted (host/port allowlist).
      # - ./restrictions.yaml:/home/app/restrictions.yaml:ro
      # Share Caddy's ACME certs so velox can use them for QUIC TLS.
      - caddy_data:/caddy-data:ro
    # velox does not expose an HTTP health endpoint, so we probe the TCP port.
    # Uses bash's /dev/tcp to avoid needing netcat/ss (not in debian:trixie-slim).
    # Invoked via bash explicitly because /bin/sh is dash on Debian.
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/8080"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    depends_on:
      caddy:
        condition: service_healthy
    # No external TCP ports - Caddy is the only TCP entry point.

  # ─── Caddy reverse proxy with auto-TLS + Cloudflare DNS-01 wildcard ─────────
  # Pre-built image published to GHCR by the docker-helm.yaml workflow.
  # Includes the Cloudflare DNS plugin (xcaddy) for wildcard TLS certs so that
  # any port-based subdomain (e.g. 3001.velox.aerol.ai) is covered automatically
  # without ever editing the Caddyfile again.
  caddy:
    image: ghcr.io/aerol-ai/caddy-cloudflare:main
    restart: unless-stopped
    dns:
      - 1.1.1.1
      - 8.8.8.8
    ports:
      - "80:80"          # HTTP (redirected to HTTPS by Caddy)
      - "443:443"        # HTTPS / WSS
      - "443:443/udp"    # HTTP/3 (optional)
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data         # TLS certificate store (persisted)
      - caddy_config:/config     # Caddy runtime config (persisted)
    environment:
      VELOX_DOMAIN: "${VELOX_DOMAIN:-localhost}"
      # Required for Cloudflare DNS-01 wildcard TLS. Get a token with
      # "Edit zone DNS" permission from https://dash.cloudflare.com/profile/api-tokens
      CLOUDFLARE_API_TOKEN: "${CLOUDFLARE_API_TOKEN}"
      # Email used for Let's Encrypt account registration
      CADDY_EMAIL: "${CADDY_EMAIL:-admin@example.com}"
    healthcheck:
      test: ["CMD-SHELL", "caddy version"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  caddy_data:
  caddy_config:
